<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>MyDesk — 개인 정리함</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#eef0ea;
    --paper-raised:#f7f8f3;
    --ink:#22303c;
    --ink-soft:#5a6b73;
    --line:#d7dbcd;
    --notes:#5b6b8c;      /* 메모 - 인디고 */
    --notes-bg:#e4e7f3;
    --todo:#c98a1f;       /* 할 일 - 머스타드 */
    --todo-bg:#f4e6c8;
    --work:#5c7a5e;       /* 업무 - 올리브그린 */
    --work-bg:#dee8dc;
    --shop:#3e7c74;       /* 쇼핑 - 틸 */
    --shop-bg:#dcece8;
    --remind:#b2495e;     /* 리마인더 - 로즈 */
    --remind-bg:#f3dde1;
    --shadow: 0 2px 10px rgba(34,48,60,0.08);
    --shadow-lg: 0 8px 28px rgba(34,48,60,0.16);
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
  h1,h2,h3,.display{font-family:'Fraunces',serif;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  ::selection{background:var(--todo-bg);}

  /* ---------- 로그인 화면 ---------- */
  #login-screen{
    min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;
  }
  #login-screen .badge{
    width:64px;height:64px;border-radius:14px;background:var(--ink);color:var(--paper);
    display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:28px;font-weight:700;
    transform:rotate(-4deg);
  }
  #login-screen h1{font-size:32px;margin:0;letter-spacing:-0.02em;}
  #login-screen p{color:var(--ink-soft);margin:0;font-size:15px;}
  #google-signin{
    display:flex;align-items:center;gap:10px;background:var(--paper-raised);border:1px solid var(--line);
    padding:12px 22px;border-radius:10px;font-weight:600;font-size:15px;box-shadow:var(--shadow);
    transition:transform .15s ease, box-shadow .15s ease;
  }
  #google-signin:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
  #login-error{color:var(--remind);font-size:13px;max-width:320px;text-align:center;display:none;}

  /* ---------- 앱 셸 ---------- */
  #app{display:none;min-height:100vh;}
  #app.active{display:flex;}

  /* 좌측 탭 레일 — 서명 요소: 바인더 인덱스 탭 */
  #tab-rail{
    width:88px;flex-shrink:0;padding:28px 0;display:flex;flex-direction:column;gap:14px;align-items:flex-start;
  }
  .tab-btn{
    width:76px;height:64px;border:none;border-radius:0 10px 10px 0;background:var(--paper-raised);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
    box-shadow:1px 2px 6px rgba(34,48,60,0.10);
    transform:translateX(-14px);transition:transform .18s ease, box-shadow .18s ease;
    border-left:4px solid transparent;
  }
  .tab-btn .ico{font-size:18px;}
  .tab-btn .lbl{font-size:10.5px;font-weight:600;color:var(--ink-soft);letter-spacing:.02em;}
  .tab-btn:hover{transform:translateX(-4px);}
  .tab-btn.active{transform:translateX(0);box-shadow:var(--shadow-lg);}
  .tab-btn[data-tab="notes"]{border-color:var(--notes);}
  .tab-btn[data-tab="todo"]{border-color:var(--todo);}
  .tab-btn[data-tab="work"]{border-color:var(--work);}
  .tab-btn[data-tab="shop"]{border-color:var(--shop);}
  .tab-btn[data-tab="remind"]{border-color:var(--remind);}
  .tab-btn.active[data-tab="notes"] .ico{color:var(--notes);}
  .tab-btn.active[data-tab="todo"] .ico{color:var(--todo);}
  .tab-btn.active[data-tab="work"] .ico{color:var(--work);}
  .tab-btn.active[data-tab="shop"] .ico{color:var(--shop);}
  .tab-btn.active[data-tab="remind"] .ico{color:var(--remind);}

  #main{flex:1;min-width:0;padding:32px 40px 80px;max-width:820px;}
  #topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:26px;flex-wrap:wrap;gap:10px;}
  #topbar h1{font-size:26px;margin:0;letter-spacing:-0.01em;}
  #topbar .date{color:var(--ink-soft);font-size:13px;}
  #signout{background:none;border:1px solid var(--line);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--ink-soft);}

  .section{display:none;}
  .section.active{display:block;}

  /* 빠른 추가 바 */
  .add-bar{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
  .add-bar input, .add-bar select{
    font-family:inherit;font-size:14px;padding:11px 14px;border-radius:10px;border:1px solid var(--line);
    background:var(--paper-raised);color:var(--ink);
  }
  .add-bar input[type=text]{flex:1;min-width:180px;}
  .add-bar input:focus, .add-bar select:focus{outline:none;border-color:var(--ink-soft);}
  .add-bar button.add-submit{
    border:none;border-radius:10px;padding:11px 20px;font-weight:600;font-size:14px;color:#fff;
  }
  #notes .add-submit{background:var(--notes);}
  #todo .add-submit{background:var(--todo);}
  #work .add-submit{background:var(--work);}
  #shop .add-submit{background:var(--shop);}
  #remind .add-submit{background:var(--remind);}

  /* 카드 리스트 */
  .card-list{display:flex;flex-direction:column;gap:10px;}
  .card{
    background:var(--paper-raised);border-radius:12px;padding:16px 18px;box-shadow:var(--shadow);
    display:flex;align-items:flex-start;gap:12px;
  }
  .card .grip{width:6px;align-self:stretch;border-radius:4px;flex-shrink:0;}
  #notes .grip{background:var(--notes);}
  #todo .grip{background:var(--todo);}
  #work .grip{background:var(--work);}
  #shop .grip{background:var(--shop);}
  #remind .grip{background:var(--remind);}
  .card .content{flex:1;min-width:0;}
  .card .title{font-weight:600;font-size:15px;margin:0 0 4px;word-break:break-word;}
  .card .meta{font-size:12px;color:var(--ink-soft);}
  .card .body-text{font-size:13.5px;color:var(--ink-soft);margin-top:6px;white-space:pre-wrap;word-break:break-word;}
  .card.done .title{text-decoration:line-through;color:var(--ink-soft);}

  /* 메모 전용 - 제목 클릭시 펼쳐지는 스타일 */
  #notes .card{flex-direction:column;align-items:stretch;gap:0;padding:0;overflow:hidden;}
  #notes .card .top-row{display:flex;align-items:center;gap:12px;padding:4px 6px 4px 18px;}
  #notes .title-btn{
    flex:1;min-width:0;background:none;border:none;text-align:left;padding:12px 0;
    display:flex;align-items:center;gap:8px;
  }
  #notes .title-btn .chevron{font-size:11px;color:var(--ink-soft);transition:transform .15s ease;flex-shrink:0;}
  #notes .title-btn.expanded .chevron{transform:rotate(90deg);}
  #notes .card .title{font-size:16px;font-family:'Fraunces',serif;font-weight:600;margin:0;}
  #notes .note-divider{height:1px;background:var(--line);margin:0 18px;}
  .note-body{
    width:100%;border:none;resize:none;outline:none;overflow:hidden;
    font-family:'Inter',sans-serif;font-size:14px;line-height:24px;color:var(--ink);
    padding:14px 18px 18px;min-height:78px;box-sizing:border-box;
  }
  .note-body::placeholder{color:#a9b0a2;}
  .card .actions{display:flex;gap:6px;flex-shrink:0;}

  /* 업무 탭 - 파일 첨부 */
  .attach-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;border-radius:8px;outline:none;padding:2px;}
  .attach-row:focus{box-shadow:0 0 0 2px var(--work);}
  .attach-chip{
    display:flex;align-items:center;gap:6px;background:var(--paper);border:1px solid var(--line);
    border-radius:8px;padding:6px 10px;font-size:12px;color:var(--ink-soft);text-decoration:none;max-width:180px;
  }
  .attach-chip img{width:22px;height:22px;object-fit:cover;border-radius:4px;flex-shrink:0;}
  .attach-chip span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .attach-chip .remove-x{margin-left:2px;color:var(--remind);flex-shrink:0;}
  .file-input-label{
    display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--ink-soft);
    border:1px dashed var(--line);border-radius:8px;padding:8px 12px;cursor:pointer;background:var(--paper-raised);
  }
  .file-input-label:hover{border-color:var(--work);color:var(--work);}
  .upload-progress{font-size:11px;color:var(--work);margin-top:4px;}

  /* 알림 설정 패널 */
  .notif-panel{
    background:var(--paper-raised);border-radius:12px;padding:14px 18px;margin-bottom:20px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;box-shadow:var(--shadow);flex-wrap:wrap;
  }
  .notif-panel .notif-status{font-size:13px;color:var(--ink-soft);display:flex;align-items:center;gap:8px;}
  .notif-dot{width:8px;height:8px;border-radius:50%;background:#aaa;flex-shrink:0;}
  .notif-dot.on{background:var(--shop);}
  .notif-dot.off{background:var(--remind);}
  .notif-panel button{
    background:var(--remind);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:12.5px;font-weight:600;
  }
  .icon-btn{background:none;border:none;padding:6px;border-radius:6px;color:var(--ink-soft);font-size:15px;}
  .icon-btn:hover{background:var(--paper);color:var(--ink);}
  .checkbox{width:20px;height:20px;border-radius:6px;border:2px solid var(--line);flex-shrink:0;margin-top:1px;
    display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff;}
  .checkbox.checked{background:var(--ink);border-color:var(--ink);}
  .pin-star{color:var(--todo);}
  .priority-high{color:var(--remind);font-weight:700;}
  .priority-mid{color:var(--todo);font-weight:700;}
  .priority-low{color:var(--ink-soft);}

  .empty-state{padding:60px 20px;text-align:center;color:var(--ink-soft);}
  .empty-state .display{font-size:20px;color:var(--ink);margin-bottom:6px;}

  .toast{
    position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:var(--paper);padding:10px 20px;border-radius:10px;font-size:13px;
    opacity:0;transition:all .25s ease;pointer-events:none;z-index:999;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (max-width:640px){
    #tab-rail{flex-direction:row;width:100%;padding:14px 10px;gap:8px;overflow-x:auto;}
    .tab-btn{transform:none;flex-shrink:0;border-radius:10px;border-left:none;border-bottom:4px solid transparent;}
    .tab-btn.active{transform:none;}
    #app.active{flex-direction:column;}
    #main{padding:20px 18px 60px;}
  }
</style>
</head>
<body>

<!-- ================= 로그인 화면 ================= -->
<div id="login-screen">
  <div class="badge">MD</div>
  <h1>MyDesk</h1>
  <p>메모 · 할 일 · 쇼핑 리스트 · 리마인더 — 나만의 정리함</p>
  <form id="login-form" style="display:flex;flex-direction:column;gap:10px;width:260px;">
    <input type="email" id="login-email" placeholder="이메일" required
      style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);font-size:14px;font-family:inherit;">
    <input type="password" id="login-password" placeholder="비밀번호" required
      style="padding:12px 14px;border-radius:10px;border:1px solid var(--line);font-size:14px;font-family:inherit;">
    <button type="submit" id="login-submit"
      style="background:var(--ink);color:var(--paper);border:none;border-radius:10px;padding:12px;font-weight:600;font-size:14px;">
      로그인
    </button>
  </form>
  <p id="login-error"></p>
</div>

<!-- ================= 앱 셸 ================= -->
<div id="app">
  <nav id="tab-rail">
    <button class="tab-btn active" data-tab="notes"><span class="ico">🗒️</span><span class="lbl">메모</span></button>
    <button class="tab-btn" data-tab="todo"><span class="ico">✅</span><span class="lbl">할 일</span></button>
    <button class="tab-btn" data-tab="work"><span class="ico">💼</span><span class="lbl">업무</span></button>
    <button class="tab-btn" data-tab="shop"><span class="ico">🛒</span><span class="lbl">쇼핑</span></button>
    <button class="tab-btn" data-tab="remind"><span class="ico">⏰</span><span class="lbl">리마인더</span></button>
  </nav>

  <main id="main">
    <div id="topbar">
      <div>
        <h1 id="section-title">메모</h1>
        <div class="date mono" id="today-date"></div>
      </div>
      <button id="signout">로그아웃</button>
    </div>

    <!-- 메모 -->
    <section class="section active" id="notes">
      <div class="add-bar">
        <input type="text" id="notes-title-input" placeholder="메모 제목">
        <button class="add-submit" id="notes-add-btn">추가</button>
      </div>
      <div class="card-list" id="notes-list"></div>
    </section>

    <!-- 할 일 -->
    <section class="section" id="todo">
      <div class="add-bar">
        <input type="text" id="todo-input" placeholder="할 일 입력">
        <select id="todo-priority"><option value="low">낮음</option><option value="mid" selected>보통</option><option value="high">높음</option></select>
        <button class="add-submit" id="todo-add-btn">추가</button>
      </div>
      <div class="card-list" id="todo-list"></div>
    </section>

    <!-- 업무 -->
    <section class="section" id="work">
      <div class="add-bar">
        <input type="text" id="work-input" placeholder="업무 내용">
        <select id="work-priority"><option value="low">낮음</option><option value="mid" selected>보통</option><option value="high">높음</option></select>
        <button class="add-submit" id="work-add-btn">추가</button>
      </div>
      <div class="card-list" id="work-list"></div>
    </section>

    <!-- 쇼핑 -->
    <section class="section" id="shop">
      <div class="add-bar">
        <input type="text" id="shop-input" placeholder="살 물건">
        <input type="text" id="shop-qty" placeholder="수량" style="width:90px;">
        <button class="add-submit" id="shop-add-btn">추가</button>
      </div>
      <div class="card-list" id="shop-list"></div>
    </section>

    <!-- 리마인더 -->
    <section class="section" id="remind">
      <div class="notif-panel">
        <div class="notif-status"><span class="notif-dot" id="notif-dot"></span><span id="notif-status-text">알림 상태 확인 중...</span></div>
        <button id="notif-enable-btn">알림 켜기</button>
      </div>
      <div class="add-bar">
        <input type="text" id="remind-input" placeholder="리마인더 내용">
        <input type="datetime-local" id="remind-time">
        <select id="remind-repeat"><option value="none">반복 없음</option><option value="daily">매일</option><option value="weekly">매주</option><option value="yearly">매년</option></select>
        <button class="add-submit" id="remind-add-btn">추가</button>
      </div>
      <div class="card-list" id="remind-list"></div>
    </section>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore, collection, addDoc, doc, updateDoc, deleteDoc,
  onSnapshot, query, orderBy, serverTimestamp, setDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { getMessaging, getToken, isSupported } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";
import { getStorage, ref as storageRef, uploadBytes, getDownloadURL, deleteObject } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

// ============ 여기를 본인 Firebase 프로젝트 값으로 채워주세요 ============
const firebaseConfig = {
  apiKey: "AIzaSyCG59MGXRXNTgzTrSCjsOpzJqWqYm7YFn8",
  authDomain: "mydesk-19280.firebaseapp.com",
  projectId: "mydesk-19280",
  storageBucket: "mydesk-19280.firebasestorage.app",
  messagingSenderId: "1061055723564",
  appId: "1:1061055723564:web:7ee90a969a8f3a2d47b989"
};
const VAPID_KEY = "BD-p-log80yU77e50sTJnv1l3lY66i01tdd1kKi8sOVaUeLMg_ZmSOp54WbSDUd5nW6TzAPc0kqvR6CKjQ_hNkc"; // Firebase Console > 프로젝트 설정 > 클라우드 메시징 > 웹 푸시 인증서
// =======================================================================

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

let uid = null;
let unsubs = [];

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2200);
}

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const err = document.getElementById('login-error');
  err.style.display = 'none';
  try {
    await signInWithEmailAndPassword(auth, email, password);
  } catch (e) {
    console.error(e);
    err.style.display = 'block';
    err.textContent = '로그인 실패: 이메일 또는 비밀번호를 확인해주세요.';
  }
});
document.getElementById('signout').onclick = () => signOut(auth);

onAuthStateChanged(auth, async (user) => {
  if (user) {
    uid = user.uid;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('active');
    startListeners();
    setupPush(false);
    updateNotifStatus();
  } else {
    uid = null;
    unsubs.forEach(u=>u());
    unsubs = [];
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('active');
  }
});

document.getElementById('today-date').textContent = new Date().toLocaleDateString('ko-KR', {year:'numeric', month:'long', day:'numeric', weekday:'long'});

// ---------------- 탭 전환 ----------------
const titles = {notes:'메모', todo:'할 일', work:'업무', shop:'쇼핑 리스트', remind:'리마인더'};
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.onclick = () => {
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById(tab).classList.add('active');
    document.getElementById('section-title').textContent = titles[tab];
  };
});

// ---------------- Firestore 헬퍼 ----------------
function col(name){ return collection(db, 'users', uid, name); }

function startListeners(){
  listenNotes();
  listenTodo();
  listenWork();
  listenShop();
  listenRemind();
}

// ---------------- 메모 ----------------
const expandedNotes = new Set(); // 지금 펼쳐진 메모 id들 (로컬 UI 상태, 저장 안 됨)
let latestNoteItems = [];

document.getElementById('notes-add-btn').onclick = async () => {
  const input = document.getElementById('notes-title-input');
  if (!input.value.trim()) return;
  const ref = await addDoc(col('notes'), { title: input.value.trim(), body:'', pinned:false, createdAt: serverTimestamp() });
  expandedNotes.add(ref.id);
  window.__focusNoteId = ref.id;
  input.value = '';
};
document.getElementById('notes-title-input').addEventListener('keydown', e=>{ if(e.key==='Enter') document.getElementById('notes-add-btn').click(); });

function buildNoteCard(n){
  const el = document.createElement('div');
  el.className = 'card';
  el.dataset.noteId = n.id;
  const expanded = expandedNotes.has(n.id);
  el.innerHTML = `
    <div class="top-row">
      <button class="title-btn ${expanded?'expanded':''}" type="button">
        <span class="chevron">▶</span>
        <p class="title">${n.pinned?'<span class=\"pin-star\">★</span> ':''}${escapeHtml(n.title)}</p>
      </button>
      <div class="actions">
        <button class="icon-btn pin-btn" data-id="${n.id}" data-pinned="${n.pinned}">${n.pinned?'📌':'📍'}</button>
        <button class="icon-btn del-btn" data-id="${n.id}">✕</button>
      </div>
    </div>
    ${expanded ? `<div class="note-divider"></div>
    <textarea class="note-body" data-id="${n.id}" placeholder="여기에 내용을 적어보세요...">${escapeHtml(n.body||'')}</textarea>` : ''}`;

  const titleBtn = el.querySelector('.title-btn');
  const pinBtn = el.querySelector('.pin-btn');
  const delBtn = el.querySelector('.del-btn');

  titleBtn.onclick = () => {
    if (expandedNotes.has(n.id)) expandedNotes.delete(n.id); else expandedNotes.add(n.id);
    renderNotesList();
  };
  pinBtn.onclick = () => updateDoc(doc(db,'users',uid,'notes',n.id), {pinned: pinBtn.dataset.pinned !== 'true'});
  delBtn.onclick = () => { expandedNotes.delete(n.id); deleteDoc(doc(db,'users',uid,'notes',n.id)); };

  if (expanded) {
    const ta = el.querySelector('.note-body');
    let timer;
    ta.addEventListener('input', () => {
      autoGrow(ta);
      clearTimeout(timer);
      timer = setTimeout(() => updateDoc(doc(db,'users',uid,'notes',n.id), {body: ta.value}), 600);
    });
    // 포커스를 잃을 때(입력 끝났을 때)만 화면을 다시 정리 - 입력 도중엔 절대 건드리지 않음
    ta.addEventListener('blur', () => renderNotesList());
    requestAnimationFrame(() => autoGrow(ta));
  }
  return el;
}

function renderNotesList(){
  const list = document.getElementById('notes-list');
  if (!latestNoteItems.length){ list.innerHTML = emptyState('아직 메모가 없어요','위 입력창에 제목을 적고 추가해보세요.'); return; }
  list.innerHTML = '';
  latestNoteItems.forEach(n => list.appendChild(buildNoteCard(n)));
  if (window.__focusNoteId) {
    const ta = list.querySelector(`.note-body[data-id="${window.__focusNoteId}"]`);
    if (ta) ta.focus();
    window.__focusNoteId = null;
  }
}

function listenNotes(){
  const q = query(col('notes'), orderBy('createdAt','desc'));
  unsubs.push(onSnapshot(q, snap=>{
    latestNoteItems = snap.docs.map(d=>({id:d.id, ...d.data()}));
    latestNoteItems.sort((a,b)=> (b.pinned===true) - (a.pinned===true));

    const list = document.getElementById('notes-list');
    const activeEl = document.activeElement;
    const isEditingNote = activeEl && activeEl.classList && activeEl.classList.contains('note-body') && list.contains(activeEl);
    if (isEditingNote) return; // 지금 입력 중이면 화면을 절대 건드리지 않음 (포커스 보존)

    renderNotesList();
  }));
}

function fileIcon(type){
  if (type && type.startsWith('image/')) return null; // 이미지는 썸네일로 보여줌
  return '📄';
}

async function uploadWorkFile(workId, file, progressEl){
  if (file.size > 10 * 1024 * 1024) { toast('10MB 이하 파일만 업로드 가능합니다'); return; }
  const path = `users/${uid}/work/${workId}/${Date.now()}_${file.name}`;
  const sref = storageRef(storage, path);
  if (progressEl) progressEl.textContent = '업로드 중...';
  try {
    await uploadBytes(sref, file);
    const url = await getDownloadURL(sref);
    const workRef = doc(db, 'users', uid, 'work', workId);
    // 최신 첨부 목록을 가져와 추가 (동시성 이슈 최소화를 위해 현재 캐시된 목록 사용)
    const current = latestWorkItems.find(w=>w.id===workId);
    const attachments = [...(current?.attachments || []), { name: file.name, url, path, type: file.type }];
    await updateDoc(workRef, { attachments });
    if (progressEl) progressEl.textContent = '';
  } catch (e) {
    console.error(e);
    if (progressEl) progressEl.textContent = '';
    toast('업로드 실패: ' + e.message);
  }
}

async function removeWorkAttachment(workId, attachment){
  const current = latestWorkItems.find(w=>w.id===workId);
  if (!current) return;
  const attachments = (current.attachments || []).filter(a => a.path !== attachment.path);
  await updateDoc(doc(db,'users',uid,'work',workId), { attachments });
  try { await deleteObject(storageRef(storage, attachment.path)); } catch(e){ console.warn('스토리지 파일 삭제 실패(이미 지워졌을 수 있음):', e.message); }
}

let latestWorkItems = [];

function listenWork(){
  const q = query(col('work'), orderBy('createdAt','desc'));
  unsubs.push(onSnapshot(q, snap=>{
    latestWorkItems = snap.docs.map(d=>({id:d.id, ...d.data()}));
    const list = document.getElementById('work-list');
    if (!latestWorkItems.length){ list.innerHTML = emptyState('업무가 없어요','새로운 업무를 추가해보세요.'); return; }
    const order = {high:0, mid:1, low:2};
    const items = [...latestWorkItems].sort((a,b)=> (a.done - b.done) || (order[a.priority]-order[b.priority]));
    list.innerHTML = '';
    items.forEach(w=>{
      const el = document.createElement('div');
      el.className = 'card' + (w.done?' done':'');
      el.style.flexDirection = 'column';
      el.style.alignItems = 'stretch';
      const prClass = w.priority==='high'?'priority-high':w.priority==='mid'?'priority-mid':'priority-low';
      const prLabel = w.priority==='high'?'높음':w.priority==='mid'?'보통':'낮음';
      const attachments = w.attachments || [];
      const chipsHtml = attachments.map(a => {
        const isImg = a.type && a.type.startsWith('image/');
        return `<a class="attach-chip" href="${a.url}" target="_blank" rel="noopener" data-path="${a.path}">
          ${isImg ? `<img src="${a.url}" alt="">` : '<span>📄</span>'}
          <span>${escapeHtml(a.name)}</span>
          <span class="remove-x" data-path="${a.path}" data-work-id="${w.id}">✕</span>
        </a>`;
      }).join('');
      el.innerHTML = `
        <div style="display:flex;align-items:flex-start;gap:12px;">
          <div class="checkbox ${w.done?'checked':''}" data-id="${w.id}" data-done="${w.done}">${w.done?'✓':''}</div>
          <div class="content">
            <p class="title">${escapeHtml(w.text)}</p>
            <div class="meta ${prClass}">${prLabel}</div>
          </div>
          <div class="actions"><button class="icon-btn del-btn" data-id="${w.id}">✕</button></div>
        </div>
        <div class="attach-row" tabindex="0" data-work-id="${w.id}" title="여기를 클릭하고 Ctrl+V로 이미지를 붙여넣을 수 있어요">
          ${chipsHtml}
          <label class="file-input-label">
            📎 파일 추가 (또는 클릭 후 Ctrl+V)
            <input type="file" accept="application/pdf,image/*" data-id="${w.id}" style="display:none;">
          </label>
        </div>
        <div class="upload-progress" data-progress-for="${w.id}"></div>`;
      list.appendChild(el);
    });
    list.querySelectorAll('.checkbox').forEach(c=>c.onclick=()=>updateDoc(doc(db,'users',uid,'work',c.dataset.id),{done: c.dataset.done!=='true'}));
    list.querySelectorAll('.del-btn').forEach(b=>b.onclick=()=>deleteDoc(doc(db,'users',uid,'work',b.dataset.id)));
    list.querySelectorAll('input[type=file]').forEach(inp=>{
      inp.onchange = () => {
        const file = inp.files[0];
        if (!file) return;
        const progressEl = list.querySelector(`.upload-progress[data-progress-for="${inp.dataset.id}"]`);
        uploadWorkFile(inp.dataset.id, file, progressEl);
        inp.value = '';
      };
    });
    list.querySelectorAll('.remove-x').forEach(x=>{
      x.onclick = (e) => {
        e.preventDefault(); e.stopPropagation();
        removeWorkAttachment(x.dataset.workId, { path: x.dataset.path });
      };
    });
    list.querySelectorAll('.attach-row').forEach(row=>{
      row.addEventListener('paste', (e) => {
        const items = e.clipboardData?.items;
        if (!items) return;
        for (const item of items) {
          if (item.kind === 'file') {
            const file = item.getAsFile();
            if (!file) continue;
            const progressEl = list.querySelector(`.upload-progress[data-progress-for="${row.dataset.workId}"]`);
            uploadWorkFile(row.dataset.workId, file, progressEl);
          }
        }
      });
    });
  }));
}

// ---------------- FCM 푸시 등록 & 알림 설정 UI ----------------
function updateNotifStatus(){
  const dot = document.getElementById('notif-dot');
  const text = document.getElementById('notif-status-text');
  const btn = document.getElementById('notif-enable-btn');
  if (!dot) return;
  if (!('Notification' in window)) {
    dot.className = 'notif-dot off';
    text.textContent = '이 브라우저는 알림을 지원하지 않습니다';
    btn.style.display = 'none';
    return;
  }
  const perm = Notification.permission;
  if (perm === 'granted') {
    dot.className = 'notif-dot on';
    text.textContent = '리마인더 푸시 알림이 켜져 있습니다';
    btn.style.display = 'none';
  } else if (perm === 'denied') {
    dot.className = 'notif-dot off';
    text.textContent = '알림이 차단되어 있습니다 — 브라우저 주소창 왼쪽 아이콘에서 직접 허용해주세요';
    btn.textContent = '알림 켜기';
    btn.style.display = 'inline-block';
  } else {
    dot.className = 'notif-dot off';
    text.textContent = '알림이 꺼져 있습니다';
    btn.textContent = '알림 켜기';
    btn.style.display = 'inline-block';
  }
}

async function setupPush(forcePrompt = false){
  try {
    if (!('Notification' in window)) return;
    const supported = await isSupported();
    if (!supported) { updateNotifStatus(); return; }
    if (!('serviceWorker' in navigator)) return;
    if (!forcePrompt && Notification.permission !== 'granted') { updateNotifStatus(); return; }

    const reg = await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    const perm = await Notification.requestPermission();
    updateNotifStatus();
    if (perm !== 'granted') return;

    const messaging = getMessaging(app);
    const token = await getToken(messaging, { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
    if (token) {
      await setDoc(doc(db, 'users', uid, 'meta', 'fcm'), { token, updatedAt: serverTimestamp() });
    }
  } catch (e) {
    console.warn('푸시 설정 실패:', e.message);
    updateNotifStatus();
  }
}

document.getElementById('notif-enable-btn').onclick = () => setupPush(true);

// ---------------- 유틸 ----------------
function escapeHtml(str){
  const d = document.createElement('div');
  d.textContent = str || '';
  return d.innerHTML;
}
function emptyState(title, sub){
  return `<div class="empty-state"><div class="display">${title}</div><div>${sub}</div></div>`;
}
function autoGrow(ta){
  ta.style.height = 'auto';
  ta.style.height = Math.max(ta.scrollHeight, 78) + 'px';
}
